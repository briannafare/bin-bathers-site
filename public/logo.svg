<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 380 90" width="380" height="90">
  <defs>
    <!-- Shield gradient - bright green -->
    <linearGradient id="shieldGrad" x1="30%" y1="10%" x2="70%" y2="90%">
      <stop offset="0%" stop-color="#6CC34A"/>
      <stop offset="100%" stop-color="#3EA82D"/>
    </linearGradient>
    <!-- Shield dark section right half -->
    <linearGradient id="shieldRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5AB83A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2D7A1F" stop-opacity="0.6"/>
    </linearGradient>
    <!-- Water drop gradient -->
    <linearGradient id="dropGrad" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#7DD9F8"/>
      <stop offset="100%" stop-color="#2AAAD4"/>
    </linearGradient>
    <!-- Shield shine overlay -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Shield shape - main green fill -->
  <path d="M14 12 L14 12 Q14 8 18 8 L62 8 Q66 8 66 12 L66 50 Q66 68 40 80 Q14 68 14 50 Z"
    fill="url(#shieldGrad)" />

  <!-- Shield dark green border/outline -->
  <path d="M14 12 L14 12 Q14 8 18 8 L62 8 Q66 8 66 12 L66 50 Q66 68 40 80 Q14 68 14 50 Z"
    fill="none" stroke="#1E6B10" stroke-width="3.5"/>

  <!-- Leaf shape (dark green, curved from lower-left to upper-right) -->
  <path d="M22 64 Q22 40 38 22 Q58 22 58 38 Q58 56 36 64 Q30 66 22 64 Z"
    fill="#2D8427" opacity="0.95"/>
  <!-- Leaf vein -->
  <path d="M22 64 Q36 48 54 26" fill="none" stroke="#5AB83A" stroke-width="1.5" opacity="0.6"/>

  <!-- Water drop (blue) overlapping the leaf -->
  <path d="M48 18 Q48 12 55 12 Q62 12 62 20 Q62 30 55 34 Q48 30 48 18 Z"
    fill="url(#dropGrad)"/>
  <!-- Drop highlight -->
  <path d="M51 14 Q51 11 54 11 Q57 11 57 15 Q57 20 54 22 Q51 20 51 14 Z"
    fill="white" opacity="0.4"/>

  <!-- Shield shine right half -->
  <path d="M40 8 L62 8 Q66 8 66 12 L66 50 Q66 68 40 80 Z"
    fill="url(#shineGrad)" opacity="0.25"/>

  <!-- Shield inner lighter highlight (top-left area) -->
  <path d="M17 13 Q17 10 20 10 L42 10 L42 14 L17 14 Z"
    fill="white" opacity="0.3" rx="2"/>

  <!-- BIN text - green -->
  <text x="82" y="54"
    font-family="'Arial Black', 'Rubik', 'Impact', sans-serif"
    font-size="36"
    font-weight="900"
    fill="#2D7820"
    letter-spacing="1">BIN</text>

  <!-- BATHERS text - dark navy -->
  <text x="148" y="54"
    font-family="'Arial Black', 'Rubik', 'Impact', sans-serif"
    font-size="36"
    font-weight="900"
    fill="#1B2A45"
    letter-spacing="0.5">BATHERS</text>
</svg>
